name: Sync catalogo Claudia

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - run: python sync_catalogo.py
        env:
          WC_URL: ${{ secrets.WC_URL }}
          WC_KEY: ${{ secrets.WC_KEY }}
          WC_SECRET: ${{ secrets.WC_SECRET }}

      - name: Commit y push si el catalogo cambio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add system-prompt.txt
          git diff --cached --quiet || git commit -m "Sync catalogo automatico $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
